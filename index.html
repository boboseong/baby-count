<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>아기 숫자 놀이</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='50' font-size='48'%3E%F0%9F%8D%8E%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <header class="hero">
      <div class="hero-top">
        <p class="eyebrow">숫자 놀이</p>
        <button id="fullscreen-button" class="secondary-button" type="button" aria-pressed="false">전체화면</button>
      </div>
      <h1>크게 보고 세어요</h1>
    </header>

    <section id="item-step" class="panel active" aria-labelledby="item-step-title">
      <h2 id="item-step-title">1. 물체</h2>
      <div id="item-groups" class="item-groups"></div>
    </section>

    <section id="number-step" class="panel" aria-labelledby="number-step-title" hidden>
      <div class="panel-head">
        <div>
          <h2 id="number-step-title">2. 숫자</h2>
          <p id="selected-item-label" class="selected-item-label"></p>
        </div>
        <button id="back-to-items" class="secondary-button" type="button">뒤로</button>
      </div>
      <div id="number-grid" class="number-grid"></div>
    </section>

    <section id="play-step" class="panel" aria-labelledby="play-step-title" hidden>
      <div class="panel-head">
        <div>
          <h2 id="play-step-title">3. 세기</h2>
          <p id="result-label" class="selected-item-label"></p>
        </div>
        <button id="home-button" class="primary-button" type="button">홈</button>
      </div>
      <div id="object-stage" class="object-stage" aria-live="polite"></div>
      <p id="status-text" class="status-text"></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
